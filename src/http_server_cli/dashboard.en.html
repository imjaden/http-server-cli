<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HTTP Server Dashboard</title>
  <link rel="icon" href="/hs-icon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117; color: #c9d1d9; min-height: 100vh; padding: 24px;
    }
    .container { max-width: 1000px; margin: 0 auto; }
    .header-row {
      display: flex; align-items: center; gap: 16px; margin-bottom: 24px;
    }
    .header-row h1 {
      font-size: 20px; font-weight: 600; white-space: nowrap;
      display: flex; align-items: center; gap: 8px;
    }
    .header-row h1 small { font-size: 13px; font-weight: 400; color: #8b949e; }
    .header-stats { display: flex; gap: 10px; flex: 1; justify-content: center; }
    .stat-pill {
      background: #161b22; border: 1px solid #30363d; border-radius: 20px;
      padding: 6px 16px; display: flex; align-items: center; gap: 6px;
      font-size: 13px;
    }
    .stat-pill .num { font-weight: 700; font-size: 16px; }
    .stat-pill .num.green { color: #3fb950; }
    .stat-pill .num.purple { color: #bc8cff; }
    .stat-pill .label { color: #8b949e; }
    .header-toolbar { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .countdown {
      font-size: 14px; font-weight: 600; color: #58a6ff; font-family: 'SF Mono', monospace;
      min-width: 36px; text-align: center;
    }
    .btn-refresh {
      background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 8px;
      padding: 7px 16px; cursor: pointer; font-size: 13px; transition: all 0.15s;
      display: flex; align-items: center; gap: 5px;
    }
    .btn-refresh:hover { background: #30363d; }
    .btn-danger {
      background: #21262d; color: #f85149; border: 1px solid #f85149; border-radius: 8px;
      padding: 7px 16px; cursor: pointer; font-size: 13px; transition: all 0.15s;
      display: flex; align-items: center; gap: 5px; white-space: nowrap;
    }
    .btn-danger:hover { background: #f85149; color: #fff; }
    .btn-danger:disabled { opacity: 0.4; cursor: not-allowed; }
    table {
      width: 100%; border-collapse: collapse; background: #161b22;
      border: 1px solid #30363d; border-radius: 8px; overflow: hidden;
    }
    thead { background: #21262d; }
    th {
      padding: 12px 16px; text-align: left; font-size: 12px; font-weight: 600;
      color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px;
      border-bottom: 1px solid #30363d;
    }
    td {
      padding: 12px 16px; font-size: 14px; border-bottom: 1px solid #21262d;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1c2128; }
    .url-cell { font-family: 'SF Mono', Monaco, monospace; color: #58a6ff; font-size: 13px; }
    .url-cell a { color: #58a6ff; text-decoration: none; }
    .url-cell a:hover { text-decoration: underline; }
    .external-link-icon { font-size: 12px; opacity: 0.6; margin-left: 2px; }
    .url-cell a:hover .external-link-icon { opacity: 1; }
    .status-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
      cursor: pointer;
    }
    .status-badge:hover { opacity: 0.8; }
    .status-badge.alive { background: rgba(63, 185, 80, 0.15); color: #3fb950; }
    .status-badge.dead { background: rgba(248, 81, 73, 0.15); color: #f85149; }
    .stats-cell { font-family: 'SF Mono', Monaco, monospace; font-size: 12px; color: #8b949e; }
    .time-cell { font-family: 'SF Mono', Monaco, monospace; font-size: 12px; color: #8b949e; }
    .action-btn {
      border: none; cursor: pointer; padding: 4px 12px; border-radius: 6px;
      font-size: 13px; transition: all 0.15s;
    }
    .action-btn.stop { background: rgba(248, 81, 73, 0.15); color: #f85149; }
    .action-btn.stop:hover { background: #f85149; color: #fff; }
    .action-btn.start { background: rgba(63, 185, 80, 0.15); color: #3fb950; }
    .action-btn.start:hover { background: #3fb950; color: #fff; }
    .action-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .empty-state {
      text-align: center; padding: 60px 20px; color: #8b949e;
    }
    .empty-state p { margin-bottom: 8px; }
    .empty-state .hint { font-size: 13px; color: #484f58; }
    #toast {
      position: fixed; top: 20px; right: 20px;
      padding: 12px 20px; border-radius: 8px; font-size: 14px;
      transition: opacity 0.3s; opacity: 0; pointer-events: none;
      z-index: 999;
    }
    #toast.success { background: rgba(63, 185, 80, 0.2); border: 1px solid #3fb950; color: #3fb950; opacity: 1; }
    #toast.error { background: rgba(248, 81, 73, 0.2); border: 1px solid #f85149; color: #f85149; opacity: 1; }
    /* GitHub icon */
    .github-icon { display: inline-flex; vertical-align: middle; margin-left: 6px; opacity: 0.7; transition: opacity 0.15s; }
    .github-icon:hover { opacity: 1; }
    .github-icon svg { width: 20px; height: 20px; fill: #c9d1d9; }
    /* hs icon */
    .hs-icon-circle { transition: fill 0.15s; }
    h1:hover .hs-icon-circle { fill: #ffffff; }
    /* Search input */
    .search-bar { margin-bottom: 12px; }
    .search-bar.hidden { display: none; }
    .search-bar input {
      width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid #30363d;
      background: #161b22; color: #c9d1d9; font-size: 13px; outline: none;
    }
    .search-bar input::placeholder { color: #484f58; }
    .search-bar input:focus { border-color: #58a6ff; }
    /* Health dot */
    .health-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; }
    .health-dot.green { background: #3fb950; }
    .health-dot.yellow { background: #d29922; }
    .health-dot.red { background: #f85149; }
    .health-dot.gray { background: #484f58; }
    /* Copy button */
    .copy-btn {
      cursor: pointer; opacity: 0.5; transition: opacity 0.15s;
      border: none; background: none; color: #8b949e; font-size: 14px; padding: 0 4px;
      vertical-align: middle;
    }
    .copy-btn:hover { opacity: 1; color: #c9d1d9; }
    /* Error overlay */
    #error-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center;
    }
    #error-overlay.show { display: flex; }
    #error-box {
      background: #161b22; border: 1px solid #f85149; border-radius: 12px;
      padding: 24px; max-width: 600px; width: 90%; max-height: 80vh; overflow: auto;
    }
    #error-box h3 { color: #f85149; margin-bottom: 12px; }
    #error-box pre {
      background: #0d1117; padding: 12px; border-radius: 8px; font-size: 12px;
      color: #c9d1d9; white-space: pre-wrap; word-break: break-all; margin-bottom: 16px;
      max-height: 300px; overflow: auto;
    }
    #error-box .btn-close-error {
      background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
      padding: 7px 20px; border-radius: 8px; cursor: pointer; font-size: 13px;
    }
    #error-box .btn-close-error:hover { background: #30363d; }
    /* Language switch */
    .lang-switch {
      position: fixed; top: 16px; right: 20px; z-index: 900;
      background: rgba(22, 27, 34, 0.9); backdrop-filter: blur(12px);
      border: 1px solid #30363d; border-radius: 28px;
      padding: 4px 4px; box-shadow: 0 2px 16px rgba(0,0,0,0.35);
    }
    .lang-toggle { display: flex; border-radius: 24px; overflow: hidden; border: 1px solid #30363d; }
    .lang-toggle a {
      display: inline-block; padding: 5px 12px; font-size: 0.8rem; font-weight: 600;
      text-decoration: none; color: #8b949e; transition: all 0.2s;
    }
    .lang-toggle a.active { background: #ffffff; color: #333; }
    .lang-toggle a:hover:not(.active) { color: #c9d1d9; background: rgba(88, 166, 255, 0.08); }
  </style>
</head>
<body>
  <div class="lang-switch">
    <div class="lang-toggle">
      <a href="/?lang=zh">🇨🇳</a>
      <a href="/en" class="active">🇺🇸</a>
    </div>
  </div>

  <div class="container">
    <div class="header-row">
      <h1>
        <svg viewBox="0 0 16 16" width="24" height="24" style="vertical-align:middle;margin-right:4px;" xmlns="http://www.w3.org/2000/svg">
          <circle cx="8" cy="8" r="7.5" fill="#e0e0e0" class="hs-icon-circle"/>
          <text x="8" y="11.5" text-anchor="middle"
                font-family="Arial,Helvetica,sans-serif"
                font-weight="900" font-size="9" fill="#333">hs</text>
        </svg>
        HTTP Server Dashboard
        <a class="github-icon" href="https://github.com/imjaden/http-server-cli" target="_blank" title="GitHub">
          <svg viewBox="0 0 16 16">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8"/>
          </svg>
        </a>
      </h1>
      <div class="header-stats" id="stats">
        <span class="stat-pill"><span class="num green" id="count-instances">—</span> <span class="label">Instances</span></span>
        <span class="stat-pill"><span class="num purple" id="count-memory">—</span> <span class="label">Total Memory</span></span>
      </div>
      <div class="header-toolbar">
        <span class="countdown" id="countdown">60</span>
        <button class="btn-refresh" id="btn-refresh" onclick="doFilter()">🔄 Refresh</button>
        <button class="btn-danger" id="btn-kill-all" onclick="killAll()">🛑 Kill All</button>
      </div>
    </div>

    <div class="search-bar hidden" id="search-bar">
      <input type="text" id="search-input" placeholder="🔍 Search port or project path..." onkeyup="doFilter()">
    </div>

    <table>
      <thead>
        <tr>
          <th>URL (Port)</th>
          <th>Health</th>
          <th>Status</th>
          <th>CPU</th>
          <th>Memory</th>
          <th>Last Access</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="servers-tbody">
        <tr><td colspan="7" class="empty-state">
          <p>Loading...</p>
          <p class="hint">Fetching server list</p>
        </td></tr>
      </tbody>
    </table>
  </div>

  <!-- Footer: version + commands -->
  <div style="max-width:1000px;margin:24px auto 0;padding:0 24px;">
    <details>
      <summary style="padding:10px 16px;cursor:pointer;font-size:13px;color:#8b949e;display:flex;align-items:center;justify-content:center;gap:8px;user-select:none;">
        <span id="footer-version" style="font-weight:600;color:#58a6ff;">Version: —</span>
        <span style="color:#484f58;">·</span>
        <span style="color:#484f58;">Click to expand command reference</span>
      </summary>
      <div id="commands-body" style="padding:0 16px 12px;font-size:12px;color:#8b949e;line-height:1.8;"></div>
    </details>
  </div>

  <div id="toast"></div>
  <div id="error-overlay">
    <div id="error-box">
      <h3>⚠️ An Error Occurred</h3>
      <pre id="error-detail"></pre>
      <button class="btn-close-error" onclick="closeError()">Close</button>
    </div>
  </div>

  <script>
    // ── Global error handler ──
    window.onerror = function(msg, url, line, col, err) {
      var detail = 'Message: ' + msg + '\nFile: ' + (url || 'unknown') + '\nLine: ' + (line || '-') + '\nCol: ' + (col || '-');
      if (err && err.stack) detail += '\n\nStack:\n' + err.stack;
      document.getElementById('error-detail').textContent = detail;
      document.getElementById('error-overlay').classList.add('show');
      return true;
    };
    window.addEventListener('unhandledrejection', function(e) {
      var detail = 'Unhandled Promise rejection: ' + (e.reason ? (e.reason.message || e.reason) : 'unknown');
      if (e.reason && e.reason.stack) detail += '\n\nStack:\n' + e.reason.stack;
      document.getElementById('error-detail').textContent = detail;
      document.getElementById('error-overlay').classList.add('show');
    });
    function closeError() { document.getElementById('error-overlay').classList.remove('show'); }

    // ── 60s countdown ──
    var countdownValue = 60;
    function resetCountdown() { countdownValue = 60; document.getElementById('countdown').textContent = '60'; }
    setInterval(function() {
      countdownValue--;
      if (countdownValue <= 0) { countdownValue = 60; doFilter(); }
      document.getElementById('countdown').textContent = countdownValue;
    }, 1000);

    // ── State cache ──
    var _cachedServers = [];
    var _healthCache = {};

    // ── API ──
    function showToast(msg, type) {
      var t = document.getElementById('toast');
      t.textContent = msg; t.className = type;
      setTimeout(function(){ t.className = ''; }, 3000);
    }
    function fetchAPI(url, method, cb) {
      fetch(url, { method: method || 'GET' })
        .then(function(r){ return r.json(); })
        .then(function(d){ cb(null, d); })
        .catch(function(e){ cb(e, null); });
    }

    // ── Render ──
    function render(servers) {
      var tbody = document.getElementById('servers-tbody');
      servers = servers.filter(function(s){ return s.alive; });
      if (servers.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-state">' +
          '<p>No HTTP servers running</p>' +
          '<p class="hint">Use <code>hs -o</code> to start one</p></td></tr>';
        return;
      }
      var totalMemory = 0;
      var html = '';
      servers.forEach(function(s) {
        var isAlive = s.alive;
        var health = _healthCache[s.port];
        var healthDot = 'gray';
        if (health && health.status_code !== null) {
          var code = health.status_code;
          healthDot = (code >= 200 && code < 400) ? 'green' : (code >= 400 && code < 500) ? 'yellow' : 'red';
        }
        var cpu = (s.stats && s.stats.cpu) || '-';
        var mem = (s.stats && s.stats.memory) || '-';
        var memoryNum = parseFloat(s.stats && s.stats.memory_num) || 0;
        if (isAlive) totalMemory += memoryNum;
        var lastAccess = s.last_access_at ? s.last_access_at.slice(0, 19).replace('T', ' ') : '-';
        var urlDisplay = s.url || ('http://localhost:' + s.port);
        if (s.index_page && s.index_page !== 'index.html') {
          urlDisplay += '/' + s.index_page;
        }

        html += '<tr>' +
          '<td class="url-cell"><a href="' + urlDisplay + '" target="_blank" title="Open in new tab">' + urlDisplay + ' <span class="external-link-icon">\u2197</span></a>' +
          '<button class="copy-btn" onclick="copyURL(event, \'' + urlDisplay + '\')" title="Copy URL">\ud83d\udccb</button></td>' +
          '<td><span class="health-dot ' + healthDot + '"></span></td>' +
          '<td><span class="status-badge alive" onclick="showServerInfo(' + s.port + ')">\ud83d\udfe2 Running</span></td>' +
          '<td class="stats-cell">' + cpu + '</td>' +
          '<td class="stats-cell">' + mem + '</td>' +
          '<td class="time-cell">' + lastAccess + '</td>' +
          '<td><button class="action-btn stop" onclick="confirmClose(' + s.port + ')">\u23f9 Close</button></td>' +
          '</tr>';
      });
      tbody.innerHTML = html;
      document.getElementById('count-instances').textContent = servers.length;
      document.getElementById('count-memory').textContent = totalMemory.toFixed(1) + ' MB';
      // Show search bar when >10 instances
      var sb = document.getElementById('search-bar');
      if (sb) {
        if (servers.length > 10) { sb.classList.remove('hidden'); }
        else { sb.classList.add('hidden'); }
      }
      resetCountdown();
    }

    function esc(s) {
      var d = document.createElement('div');
      d.appendChild(document.createTextNode(s || ''));
      return d.innerHTML;
    }

    // ── Copy URL ──
    function copyURL(ev, url) {
      ev.stopPropagation();
      navigator.clipboard.writeText(url).then(function() {
        showToast('URL copied: ' + url, 'success');
      }).catch(function() {
        showToast('Copy failed', 'error');
      });
    }

    // ── Search filter ──
    function doFilter() {
      var kw = document.getElementById('search-input').value.toLowerCase();
      var filtered = _cachedServers;
      if (kw) {
        filtered = _cachedServers.filter(function(s) {
          return ('' + s.port).indexOf(kw) >= 0 || (s.path || '').toLowerCase().indexOf(kw) >= 0;
        });
      }
      render(filtered);
    }

    // ── Health check ──
    function pingServer(port) {
      fetchAPI('/api/ping/' + port, 'GET', function(err, data) {
        if (!err && data && data.success) {
          _healthCache[port] = data;
          doFilter();
        }
      });
    }

    // ── STATUS dialog ──
    function showServerInfo(port) {
      fetchAPI('/api/status/' + port, 'GET', function(err1, statusData) {
        if (err1 || !statusData.success) { showToast('Failed to get server info', 'error'); return; }
        fetchAPI('/api/log/' + port, 'GET', function(err2, logData) {
          var info = statusData.data || {};
          var log = (logData && logData.success) ? logData.log : '';
          var msg = 'Port: ' + info.port + '\n'
            + 'Path: ' + (info.path || '-') + '\n'
            + 'PID: ' + (info.pid || '-') + '\n'
            + 'Memory: ' + (info.stats ? (info.stats.memory || '-') : '-') + '\n'
            + 'Started: ' + (info.started_at ? info.started_at.slice(0, 19).replace('T', ' ') : '-') + '\n'
            + 'Log: ' + (info.log_path || '-') + '\n'
            + 'Last Access: ' + (info.last_access_at ? info.last_access_at.slice(0, 19).replace('T', ' ') : '-') + '\n'
            + '\n-- Recent Log (50 lines) ------------------\n'
            + (log || 'No log data');
          alert(msg);
        });
      });
    }

    // ── Kill ──
    function confirmClose(port) {
      fetchAPI('/api/status/' + port, 'GET', function(err, data) {
        if (err || !data.success) { showToast('Failed to get server info', 'error'); return; }
        var info = data.data || {};
        var msg = 'Are you sure you want to close this server?\n\n'
          + 'Port: ' + info.port + '\n'
          + 'Path: ' + (info.path || '-') + '\n'
          + 'PID: ' + (info.pid || '-') + '\n'
          + 'Memory: ' + (info.stats ? (info.stats.memory || '-') : '-') + '\n'
          + 'Started: ' + (info.started_at ? info.started_at.slice(0, 19).replace('T', ' ') : '-');
        if (confirm(msg)) { killServer(port); }
      });
    }
    function killServer(port) {
      var btn = event && event.target;
      if (btn) btn.disabled = true;
      fetchAPI('/api/kill/' + port, 'POST', function(err, data) {
        if (btn) btn.disabled = false;
        if (err || !data.success) { showToast('Failed to close port ' + port, 'error'); return; }
        showToast('Port ' + port + ' closed', 'success');
        doFilter();
      });
    }
    function killAll() {
      if (!confirm('Are you sure you want to close all HTTP servers?')) return;
      var btn = document.getElementById('btn-kill-all');
      btn.disabled = true;
      fetchAPI('/api/kill-all', 'POST', function(err, data) {
        btn.disabled = false;
        if (err || !data.success) { showToast('Failed to kill all', 'error'); return; }
        showToast('All servers closed', 'success');
        doFilter();
      });
    }

    // ── Load servers ──
    function loadServers() {
      fetchAPI('/api/servers', 'GET', function(err, data) {
        if (err) { showToast('Failed to fetch server list', 'error'); return; }
        _cachedServers = (data.data && data.data.servers) || [];
        // Ping each server in background
        _cachedServers.forEach(function(s) { pingServer(s.port); });
        doFilter();
      });
    }

    // ── Load version & commands ──
    function loadInfo() {
      fetchAPI('/api/info', 'GET', function(err, data) {
        if (err || !data.success) return;
        document.getElementById('footer-version').textContent = 'Version: ' + data.version;
        var body = document.getElementById('commands-body');
        if (!body) return;
        var html = '';
        data.commands.forEach(function(c) {
          html += '<div style=\"display:flex;gap:12px;padding:3px 0;\">' +
            '<code style=\"color:#c9d1d9;white-space:nowrap;min-width:300px;\">' + esc(c.cmd) + '</code>' +
            '<span>' + esc(c.desc) + '</span></div>';
        });
        body.innerHTML = html;
      });
    }
    loadServers();
    loadInfo();
  </script>
</body>
</html>
